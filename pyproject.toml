[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = '''
/(
  \.tmp_.*
  | artifacts
  | generated_models
  | recovery
  | runs
  | BVH_walking_animation/cmuconvert-.*
)/
'''

[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = [
  ".tmp_*",
  "artifacts",
  "generated_models",
  "recovery",
  "runs",
  "BVH_walking_animation/cmuconvert-*",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
